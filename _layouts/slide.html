<!doctype html>
<html>

<head>
    <meta charset="utf-8">

    <title>{% if post.title %}{{ post.title }} | {{ page.title }}{% else %}{{ site.title }}{% endif %}</title>

    <meta name="author" content="{{ site.author }}">
    <meta name="description" content="{{ site.description }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.bootcdn.net/ajax/libs/reveal.js/4.3.1/reveal.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/reveal.js/4.3.1/theme/solarized.css" rel="stylesheet">
    <style type="text/css">
        p {
            text-align: left;
        }

        .reveal h1 {
            text-align: left;
            font-size: 100%;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="reveal">
        <div class="slides">
            {{ content }}
        </div>
    </div>

    <!-- <script src="{{ site.github.url }}/reveal.js/dist/reveal.js"></script>
    <script src="{{ site.github.url }}/reveal.js/plugin/zoom/zoom.js"></script>
    <script src="{{ site.github.url }}/reveal.js/plugin/notes/notes.js"></script>
    <script src="{{ site.github.url }}/reveal.js/plugin/search/search.js"></script>
    <script src="{{ site.github.url }}/reveal.js/plugin/markdown/markdown.js"></script>
    <script src="{{ site.github.url }}/reveal.js/plugin/highlight/highlight.js"></script> -->

    <script src="https://cdn.bootcdn.net/ajax/libs/reveal.js/4.3.1/reveal.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/reveal.js/4.3.1/plugin/zoom/zoom.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/reveal.js/4.3.1/plugin/notes/notes.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/reveal.js/4.3.1/plugin/search/search.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/reveal.js/4.3.1/plugin/markdown/markdown.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/reveal.js/4.3.1/plugin/highlight/highlight.js"></script>

    <!-- reveal.js init -->
    <script>

        // Also available as an ES module, see:
        // https://revealjs.com/initialization/
        Reveal.initialize({
            controls: true,
            progress: true,
            center: true,
            hash: true,

            // Learn about plugins: https://revealjs.com/plugins/
            plugins: [RevealZoom, RevealNotes, RevealSearch, RevealMarkdown, RevealHighlight]
        });

    </script>
    <!-- End reveal.js init -->
</body>

</html>
